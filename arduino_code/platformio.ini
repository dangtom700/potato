; PlatformIO Project Configuration File
;
; MSE 312 -- Directional control firmware for Arduino Mega 2560 driving a
; TB6568KQ H-bridge through an SN7400 NAND board (IN = PWM AND DIR).
;
; Two environments:
;   megaatmega2560 -> the real firmware (build / upload / monitor)
;   native         -> host unit tests for the pure logic  (pio test -e native)

; `pio run` / the VSCode Upload button build only the firmware env. The `native`
; env is test-only (it has no Arduino.h) and is reached explicitly via
; `pio test -e native`, so it must NOT be part of a default build/upload.
[platformio]
default_envs = megaatmega2560

[env:megaatmega2560]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
monitor_speed = 115200
monitor_eol   = LF     ; send '\n' when you press Enter in the monitor
monitor_echo  = yes    ; show what you type in the monitor
; The upload/monitor port is auto-detected. Uncomment and set if you have more
; than one board attached (find it with:  pio device list).
; upload_port  = COM5
; monitor_port = COM5

; ---- Host unit tests (no hardware) -----------------------------------------
; Runs test/test_logic/ against include/MotorLogic.h using Unity.
[env:native]
platform       = native
test_framework = unity
build_flags    = -std=c++11 -Iinclude
